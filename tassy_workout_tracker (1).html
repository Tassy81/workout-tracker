<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tassy Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #121014;
    --surface: #1c1922;
    --border: #2e2838;
    --border-strong: #45394f;
    --text: #efeaf6;
    --text-muted: #a99fb8;
    --text-faint: #756a86;
    --accent: #9b5de5;
    --accent-light: #2a1f3d;
    --accent-text: #d2b3f7;
    --new-col: #271b38;
    --new-col-border: #5c3d8a;
    --improved: #c79bf2;
    --danger: #e06a6a;
    --pt-col: #18151d;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1.25rem 4rem;
  }

  header {
    max-width: 1200px;
    margin: 0 auto 1.25rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    border-bottom: 1px solid var(--border-strong);
    padding-bottom: 1rem;
  }

  .header-left h1 {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.5px;
  }

  .header-left p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .controls label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  input[type="date"] {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    outline: none;
  }

  input[type="date"]:focus { border-color: var(--accent); }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    transition: background 0.15s;
  }

  .btn:hover { background: var(--bg); }

  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn.primary:hover { background: var(--accent-text); }

  /* TABS */
  .tabs {
    max-width: 1200px;
    margin: 0 auto 1rem;
    display: flex;
    gap: 4px;
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 20px;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    cursor: pointer;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--bg);
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }

  .tab.active {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border-strong);
  }

  .main {
    max-width: 1200px;
    margin: 0 auto;
  }

  .tbl-wrap {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 0 var(--radius) var(--radius) var(--radius);
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 540px;
  }

  thead th {
    padding: 9px 12px;
    background: var(--surface);
    font-weight: 500;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
  }

  thead th:first-child { text-align: left; min-width: 200px; }
  thead th.pt-head { background: var(--pt-col); color: var(--text-faint); }
  thead th.session-head { color: var(--text); min-width: 90px; }
  thead th.new-head { background: var(--new-col); color: var(--accent-text); min-width: 100px; }

  tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    color: var(--text-muted);
    vertical-align: middle;
  }

  tbody td:first-child { text-align: left; color: var(--text); font-size: 13px; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #221d2c; }

  td.pt-val {
    background: var(--pt-col);
    font-family: 'DM Mono', monospace;
    color: var(--text-faint);
    font-size: 12px;
  }

  td.session-val {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  td.improved { color: #e3cffc !important; font-weight: 600; }
  td.new-cell { background: var(--new-col); }

  .load-input {
    width: 70px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 3px 6px;
    border: 1px solid var(--new-col-border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    text-align: right;
    display: block;
    margin-left: auto;
    outline: none;
  }

  .load-input:focus { border-color: var(--accent); }

  .del-btn {
    margin-left: 5px;
    font-size: 10px;
    color: var(--text-faint);
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'DM Mono', monospace;
    transition: color 0.15s, border-color 0.15s;
    vertical-align: middle;
  }

  .del-btn:hover { color: var(--danger); border-color: var(--danger); }

  .hint {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
  }

  .hint .green { color: var(--improved); }

  /* REST TIMER */
  .rest-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent-text);
    background: transparent;
    border: 1px solid var(--new-col-border);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
    cursor: pointer;
    vertical-align: middle;
  }
  .rest-btn:hover { background: var(--new-col); }

  #timerOverlay {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 14px 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    gap: 14px;
    z-index: 50;
  }
  #timerOverlay.show { display: flex; }
  #timerLabel {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  #timerDisplay {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--accent-text);
    min-width: 64px;
    text-align: center;
  }
  .timer-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--bg);
    color: var(--text);
  }
  .timer-btn:hover { background: var(--new-col); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Tassy Workout Tracker</h1>
    <p>PT prescribed · Log each session to track progress</p>
  </div>
  <div class="controls">
    <label>Date</label>
    <input type="date" id="sessionDate">
    <button class="btn primary" id="saveBtn">+ Log session</button>
    <button class="btn" id="clearBtn">Clear day</button>
    <button class="btn" id="exportBtn">⬇ Backup</button>
    <button class="btn" id="importBtn">⬆ Restore</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-day="0">Day 1</button>
  <button class="tab" data-day="1">Day 2</button>
</div>

<main class="main">
  <div class="tbl-wrap">
    <table id="mainTable"></table>
  </div>
  <p class="hint" id="hint"></p>
</main>

<div id="timerOverlay">
  <div>
    <div id="timerLabel">Rest</div>
    <div id="timerDisplay">0:00</div>
  </div>
  <button class="timer-btn" id="timerPause">Pause</button>
  <button class="timer-btn" id="timerReset">Reset</button>
  <button class="timer-btn" id="timerClose">✕</button>
</div>

<script>
const DAYS = [
  {
    label: "Day 1",
    exercises: [
      { n: "135° Forearm Wall Slides",                    load: "b.w.",  sets: 3, reps: "10",   tempo: "2010",rest: "10s" },
      { n: "Cable Standing Side Swipes",                  load: "5",     sets: 3, reps: "12/s", tempo: "2010",rest: "10s" },
      { n: "Cable Kickback (back & out) (ankle straps)",  load: "3.75",  sets: 3, reps: "12/s", tempo: "2011",rest: "10s" },
      { n: "BB Box Squat (6 risers)",                     load: "40",    sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
      { n: "Mach Hip Thrust",                             load: "50",    sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
      { n: "Mach Lat Pulldown (close pronated grip)",     load: "2x20",  sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
      { n: "BB Bench Press (close grip)",                 load: "20",    sets: 3, reps: "10",   tempo: "2010",rest: "90s" }
    ]
  },
  {
    label: "Day 2",
    exercises: [
      { n: "Prone W to Y",                                load: "b.w.",  sets: 3, reps: "10",   tempo: "2010",rest: "10s" },
      { n: "DB 3-mo Pose Pullover",                       load: "5",     sets: 3, reps: "12",   tempo: "2020",rest: "10s" },
      { n: "Kneeling Side Plank w Straight Leg Raises",   load: "b.w.",  sets: 3, reps: "12/s", tempo: "2011",rest: "10s" },
      { n: "DB Bulgarian Split Squat in a Rack (glute focus)", load: "10", sets: 3, reps: "10/s", tempo: "2010",rest: "90s" },
      { n: "DB Goblet Cyclist Squat",                     load: "10",    sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
      { n: "Mach Seated Row (pin loaded) (neutral grip) [3]", load: "25", sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
      { n: "DB Incl Bench Press",                         load: "2x6",   sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
      { n: "DB Incl Bench (60deg) Press (neutral grip)",  load: "2x3",   sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
      { n: "DB Seated Hammer Curl",                       load: "2x4",   sets: 3, reps: "10",   tempo: "2010",rest: "10s" },
      { n: "DB Skull Crusher",                            load: "2x3",   sets: 3, reps: "10",   tempo: "2010",rest: "1m"  }
    ]
  }
];

const SK = 'wt_sessions_v3';
let allSessions = [[], []]; // one array per day
try { allSessions = JSON.parse(localStorage.getItem(SK) || '[[],[]]'); } catch(e) {}

let activeDay = 0;

document.getElementById('sessionDate').value = new Date().toISOString().split('T')[0];

function save() {
  try { localStorage.setItem(SK, JSON.stringify(allSessions)); } catch(e) {}
}

function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: '2-digit' });
}

function toNum(s) { const n = parseFloat(s); return isNaN(n) ? null : n; }

function render() {
  const day = DAYS[activeDay];
  const sessions = allSessions[activeDay];
  const table = document.getElementById('mainTable');
  const hint = document.getElementById('hint');

  // HEADER
  let head = `<thead><tr>
    <th>Exercise</th>
    <th style="text-align:right">Sets × Reps</th>
    <th class="pt-head">Tempo</th>
    <th class="pt-head">Rest</th>
    <th class="pt-head">PT load</th>`;

  sessions.forEach((s, i) => {
    head += `<th class="session-head">${fmtDate(s.date)}<button class="del-btn" data-action="delete" data-si="${i}">✕</button></th>`;
  });

  head += `<th class="new-head">New session</th></tr></thead>`;

  // BODY
  let body = `<tbody>`;
  day.exercises.forEach((ex, ei) => {
    body += `<tr><td>${ex.n}</td>`;
    body += `<td style="font-family:'DM Mono',monospace;font-size:12px">${ex.sets} × ${ex.reps}</td>`;
    body += `<td class="pt-val">${ex.tempo}</td>`;
    body += `<td class="pt-val">${ex.rest}<button class="rest-btn" data-action="rest" data-rest="${ex.rest}" data-name="${ex.n.replace(/"/g,'&quot;')}">▶</button></td>`;
    body += `<td class="pt-val">${ex.load}</td>`;

    sessions.forEach((s, si) => {
      const val  = s.loads[ei] || '';
      const prev = si > 0 ? (sessions[si-1].loads[ei] || '') : '';
      const n = toNum(val), p = toNum(prev);
      const better = n !== null && p !== null && n > p;
      body += `<td class="session-val${better ? ' improved' : ''}">${val || '—'}</td>`;
    });

    body += `<td class="new-cell"><input class="load-input" data-ei="${ei}" type="text" placeholder="${ex.load}"></td>`;
    body += `</tr>`;
  });

  body += `</tbody>`;
  table.innerHTML = head + body;

  hint.innerHTML = sessions.length
    ? `<span class="green">Green</span> = heavier than previous session &nbsp;·&nbsp; Scroll right for all sessions`
    : `Fill in the "New session" column then click "+ Log session".`;
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    activeDay = parseInt(this.getAttribute('data-day'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    render();
  });
});

// Delete via delegation
document.getElementById('mainTable').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action="delete"]');
  if (!btn) return;
  const si = parseInt(btn.getAttribute('data-si'));
  if (confirm(`Remove session from ${fmtDate(allSessions[activeDay][si].date)}?`)) {
    allSessions[activeDay].splice(si, 1);
    save();
    render();
  }
});

// Save session
document.getElementById('saveBtn').addEventListener('click', function() {
  const date = document.getElementById('sessionDate').value;
  if (!date) { alert('Please pick a date.'); return; }
  const loads = DAYS[activeDay].exercises.map((_, ei) => {
    const el = document.querySelector(`.load-input[data-ei="${ei}"]`);
    return el ? el.value.trim() : '';
  });
  allSessions[activeDay].push({ date, loads });
  save();
  render();
});

// Clear day
document.getElementById('clearBtn').addEventListener('click', function() {
  if (!allSessions[activeDay].length) return;
  if (confirm(`Clear all sessions for ${DAYS[activeDay].label}?`)) {
    allSessions[activeDay] = [];
    save();
    render();
  }
});

// Export backup
document.getElementById('exportBtn').addEventListener('click', function() {
  const blob = new Blob([JSON.stringify(allSessions, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `tassy-workout-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// Import backup
document.getElementById('importBtn').addEventListener('click', function() {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const parsed = JSON.parse(evt.target.result);
      if (!Array.isArray(parsed) || parsed.length !== 2) throw new Error('bad format');
      if (!confirm('This will replace all current sessions with the backup. Continue?')) return;
      allSessions = parsed;
      save();
      render();
      alert('Backup restored successfully.');
    } catch (err) {
      alert('Could not read that file — make sure it\'s a backup exported from this tracker.');
    }
  };
});

// REST TIMER
function parseRest(s) {
  s = s.trim().toLowerCase();
  if (s.endsWith('ms')) return Math.round(parseFloat(s) / 1000);
  if (s.endsWith('m')) return Math.round(parseFloat(s) * 60);
  if (s.endsWith('s')) return Math.round(parseFloat(s));
  const n = parseFloat(s);
  return isNaN(n) ? 60 : n;
}

let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let timerPaused = false;

const overlay = document.getElementById('timerOverlay');
const timerDisplay = document.getElementById('timerDisplay');
const timerLabel = document.getElementById('timerLabel');
const timerPauseBtn = document.getElementById('timerPause');

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function tick() {
  if (timerPaused) return;
  timerRemaining--;
  timerDisplay.textContent = formatTime(Math.max(timerRemaining, 0));
  if (timerRemaining <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    beep();
    timerDisplay.textContent = "Go!";
  }
}

function startTimer(seconds, label) {
  if (timerInterval) clearInterval(timerInterval);
  timerTotal = seconds;
  timerRemaining = seconds;
  timerPaused = false;
  timerPauseBtn.textContent = 'Pause';
  timerLabel.textContent = label;
  timerDisplay.textContent = formatTime(seconds);
  overlay.classList.add('show');
  timerInterval = setInterval(tick, 1000);
}

document.getElementById('mainTable').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action="rest"]');
  if (!btn) return;
  const secs = parseRest(btn.getAttribute('data-rest'));
  startTimer(secs, btn.getAttribute('data-name'));
});

timerPauseBtn.addEventListener('click', function() {
  timerPaused = !timerPaused;
  this.textContent = timerPaused ? 'Resume' : 'Pause';
});

document.getElementById('timerReset').addEventListener('click', function() {
  startTimer(timerTotal, timerLabel.textContent);
});

document.getElementById('timerClose').addEventListener('click', function() {
  if (timerInterval) clearInterval(timerInterval);
  overlay.classList.remove('show');
});

render();

</script>
</body>
</html>
