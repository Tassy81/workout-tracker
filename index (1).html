<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Workout Tracker</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --border-strong: #c8c4bc;
    --text: #1a1916;
    --text-muted: #7a7870;
    --text-faint: #b0ada6;
    --accent: #2d5a3d;
    --accent-text: #1e3d29;
    --new-col: #f0f7f2;
    --new-col-border: #c2ddc9;
    --improved: #2d5a3d;
    --danger: #8b2e2e;
    --pt-col: #f9f8f6;
    --radius: 10px;
    --radius-sm: 6px;
    --mono: ui-monospace, 'SF Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.25rem 1rem 4rem; }
  header { max-width: 1200px; margin: 0 auto 1.25rem; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; border-bottom: 1px solid var(--border-strong); padding-bottom: 1rem; }
  .header-left h1 { font-family: var(--mono); font-size: 18px; font-weight: 500; letter-spacing: -0.5px; }
  .header-left p { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .controls label { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
  input[type="date"] { font-family: var(--mono); font-size: 13px; padding: 7px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; -webkit-appearance: none; appearance: none; }
  input[type="date"]:focus { border-color: var(--accent); }
  .btn { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); transition: background 0.15s; -webkit-appearance: none; appearance: none; }
  .btn:active { opacity: 0.7; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tabs { max-width: 1200px; margin: 0 auto 0; display: flex; gap: 4px; }
  .tab { font-family: var(--mono); font-size: 13px; font-weight: 500; padding: 7px 20px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; cursor: pointer; border: 1px solid var(--border); border-bottom: none; background: var(--bg); color: var(--text-muted); -webkit-appearance: none; appearance: none; }
  .tab.active { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
  .main { max-width: 1200px; margin: 0 auto; }
  .tbl-wrap { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 0 var(--radius) var(--radius) var(--radius); overflow: hidden; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 540px; }
  thead th { padding: 9px 12px; background: var(--surface); font-weight: 500; color: var(--text-muted); font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); text-align: right; white-space: nowrap; }
  thead th:first-child { text-align: left; min-width: 200px; }
  thead th.pt-head { background: var(--pt-col); color: var(--text-faint); }
  thead th.session-head { color: var(--text); min-width: 90px; }
  thead th.new-head { background: var(--new-col); color: var(--accent-text); min-width: 100px; }
  tbody td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: right; color: var(--text-muted); vertical-align: middle; }
  tbody td:first-child { text-align: left; color: var(--text); font-size: 13px; }
  tbody tr:last-child td { border-bottom: none; }
  td.pt-val { background: var(--pt-col); font-family: var(--mono); color: var(--text-faint); font-size: 12px; }
  td.session-val { font-family: var(--mono); font-size: 13px; color: var(--text-muted); }
  td.improved { color: var(--improved) !important; font-weight: 500; }
  td.new-cell { background: var(--new-col); }
  .load-input { width: 70px; font-family: var(--mono); font-size: 13px; padding: 3px 6px; border: 1px solid var(--new-col-border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); text-align: right; display: block; margin-left: auto; outline: none; -webkit-appearance: none; appearance: none; }
  .load-input:focus { border-color: var(--accent); }
  .del-btn { margin-left: 5px; font-size: 10px; color: var(--text-faint); cursor: pointer; border: 1px solid var(--border); background: transparent; border-radius: 4px; padding: 1px 5px; font-family: var(--mono); vertical-align: middle; -webkit-appearance: none; appearance: none; }
  .hint { font-size: 12px; color: var(--text-faint); margin-top: 10px; font-family: var(--mono); }
  .hint .green { color: var(--improved); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Workout Tracker</h1>
    <p>PT prescribed &middot; Log each session to track progress</p>
  </div>
  <div class="controls">
    <label>Date</label>
    <input type="date" id="sessionDate">
    <button class="btn primary" id="saveBtn">+ Log session</button>
    <button class="btn" id="clearBtn">Clear day</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-day="0">Day 1</button>
  <button class="tab" data-day="1">Day 2</button>
</div>

<main class="main">
  <div class="tbl-wrap">
    <table id="mainTable"></table>
  </div>
  <p class="hint" id="hint"></p>
</main>

<script>
document.addEventListener('DOMContentLoaded', function() {

  var DAYS = [
    {
      label: "Day 1",
      exercises: [
        { n: "Forearm Wall Climbs",                         load: "b.w.",  sets: 3, reps: "x4",   tempo: "-",   rest: "10s" },
        { n: "Weighted Standing Hip Hikes",                 load: "8 kg",  sets: 3, reps: "10/s", tempo: "2011",rest: "10s" },
        { n: "Plank March",                                 load: "b.w.",  sets: 3, reps: "16",   tempo: "1011",rest: "10s" },
        { n: "DB Incl Bench Prone Row",                     load: "2x10",  sets: 3, reps: "10",   tempo: "2010",rest: "10s" },
        { n: "DB Reverse Lunge",                            load: "2x10",  sets: 3, reps: "10/s", tempo: "2010",rest: "1m"  },
        { n: "Landmine SA Press (lady bar)",                load: "1.25",  sets: 3, reps: "10/s", tempo: "2011",rest: "10s" },
        { n: "BB RDL",                                      load: "45 kg", sets: 3, reps: "10",   tempo: "2010",rest: "1m"  },
        { n: "Cable Face Pull (high pulley)",               load: "7.5",   sets: 3, reps: "12",   tempo: "2010",rest: "10s" },
        { n: "Cable Triceps Pressdown (rope)",              load: "7.5",   sets: 3, reps: "12",   tempo: "2010",rest: "10s" },
        { n: "Cable Hammer Curl",                           load: "5",     sets: 3, reps: "12",   tempo: "2010",rest: "1m"  }
      ]
    },
    {
      label: "Day 2",
      exercises: [
        { n: "Prone W (10s HOLD)",                                   load: "b.w.", sets: 3, reps: "x3",   tempo: "-",   rest: "10s" },
        { n: "Dead Bug",                                             load: "b.w.", sets: 3, reps: "16",   tempo: "2020",rest: "10s" },
        { n: "Kneeling Side Plank w Banded Clams",                   load: "blue",sets: 3, reps: "12/s", tempo: "2011",rest: "10s" },
        { n: "Lat Pulldown (mid pronated grip) [2]",                 load: "30",  sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
        { n: "Mach Chest Press (neutral grip) [5]",                  load: "17",  sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
        { n: "Mach Leg Extension [2,2]",                             load: "25",  sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
        { n: "Prone Leg Curl [2]",                                   load: "25.3",sets: 3, reps: "10",   tempo: "2010",rest: "90s" },
        { n: "Mach Pec Fly [seat 6, handles 1]",                     load: "5",   sets: 3, reps: "12",   tempo: "2010",rest: "1m"  },
        { n: "Mach Reverse Fly (pronated) [seat 2, handles 7]",      load: "2.5", sets: 3, reps: "12",   tempo: "2010",rest: "1m"  },
        { n: "DB Standing Lateral Raise",                            load: "2x2", sets: 3, reps: "12",   tempo: "2010",rest: "1m"  }
      ]
    }
  ];

  var SK = 'wt_sessions_v1';
  var allSessions = [[], []];
  try { allSessions = JSON.parse(localStorage.getItem(SK) || '[[],[]]'); } catch(e) {}
  if (!Array.isArray(allSessions) || allSessions.length < 2) { allSessions = [[], []]; }

  var activeDay = 0;

  var today = new Date();
  var dd = String(today.getDate()).padStart(2, '0');
  var mm = String(today.getMonth() + 1).padStart(2, '0');
  var yyyy = today.getFullYear();
  document.getElementById('sessionDate').value = yyyy + '-' + mm + '-' + dd;

  function save() {
    try { localStorage.setItem(SK, JSON.stringify(allSessions)); } catch(e) {}
  }

  function fmtDate(d) {
    try {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: '2-digit' });
    } catch(e) { return d; }
  }

  function toNum(s) { var n = parseFloat(s); return isNaN(n) ? null : n; }

  function render() {
    var day = DAYS[activeDay];
    var sessions = allSessions[activeDay];
    var table = document.getElementById('mainTable');
    var hint = document.getElementById('hint');

    var head = '<thead><tr>' +
      '<th>Exercise</th>' +
      '<th style="text-align:right">Sets x Reps</th>' +
      '<th class="pt-head">Tempo</th>' +
      '<th class="pt-head">Rest</th>' +
      '<th class="pt-head">PT load</th>';

    for (var i = 0; i < sessions.length; i++) {
      head += '<th class="session-head">' + fmtDate(sessions[i].date) +
        '<button class="del-btn" data-action="delete" data-si="' + i + '">x</button></th>';
    }
    head += '<th class="new-head">New session</th></tr></thead>';

    var body = '<tbody>';
    for (var ei = 0; ei < day.exercises.length; ei++) {
      var ex = day.exercises[ei];
      body += '<tr><td>' + ex.n + '</td>';
      body += '<td style="font-family:ui-monospace,\'SF Mono\',Menlo,monospace;font-size:12px">' + ex.sets + ' x ' + ex.reps + '</td>';
      body += '<td class="pt-val">' + ex.tempo + '</td>';
      body += '<td class="pt-val">' + ex.rest + '</td>';
      body += '<td class="pt-val">' + ex.load + '</td>';

      for (var si = 0; si < sessions.length; si++) {
        var val = sessions[si].loads[ei] || '';
        var prev = si > 0 ? (sessions[si-1].loads[ei] || '') : '';
        var n = toNum(val), p = toNum(prev);
        var better = n !== null && p !== null && n > p;
        body += '<td class="session-val' + (better ? ' improved' : '') + '">' + (val || '-') + '</td>';
      }

      body += '<td class="new-cell"><input class="load-input" data-ei="' + ei + '" type="text" placeholder="' + ex.load + '"></td>';
      body += '</tr>';
    }
    body += '</tbody>';

    table.innerHTML = head + body;

    hint.innerHTML = sessions.length
      ? '<span class="green">Green</span> = heavier than previous session &nbsp;&middot;&nbsp; Scroll right for all sessions'
      : 'Fill in the "New session" column then tap "+ Log session".';
  }

  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      activeDay = parseInt(this.getAttribute('data-day'));
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      render();
    });
  });

  document.getElementById('mainTable').addEventListener('click', function(e) {
    var btn = e.target.closest ? e.target.closest('[data-action="delete"]') : null;
    if (!btn) return;
    var si = parseInt(btn.getAttribute('data-si'));
    if (confirm('Remove session from ' + fmtDate(allSessions[activeDay][si].date) + '?')) {
      allSessions[activeDay].splice(si, 1);
      save();
      render();
    }
  });

  document.getElementById('saveBtn').addEventListener('click', function() {
    var date = document.getElementById('sessionDate').value;
    if (!date) { alert('Please pick a date.'); return; }
    var loads = [];
    for (var ei = 0; ei < DAYS[activeDay].exercises.length; ei++) {
      var el = document.querySelector('.load-input[data-ei="' + ei + '"]');
      loads.push(el ? el.value.trim() : '');
    }
    allSessions[activeDay].push({ date: date, loads: loads });
    save();
    render();
  });

  document.getElementById('clearBtn').addEventListener('click', function() {
    if (!allSessions[activeDay].length) return;
    if (confirm('Clear all sessions for ' + DAYS[activeDay].label + '?')) {
      allSessions[activeDay] = [];
      save();
      render();
    }
  });

  render();

});
</script>
</body>
</html>
